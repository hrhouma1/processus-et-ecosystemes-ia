services:
  mlflow:
    build:
      context: ./mlflow
    image: mlops/mlflow-recap:latest
    container_name: mlflow-recap-05
    ports:
      - "5000:5000"
    volumes:
      - ./database:/mlflow/database     # bind mount -> host folder MUST exist
      - ./mlruns:/mlflow/mlruns         # bind mount -> host folder MUST exist
      - .:/work                         # whole project visible from Docker Desktop -> Exec -> ls
    working_dir: /work
    networks:
      - recap-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  trainer:
    build:
      context: ./trainer
    image: mlops/trainer-recap:latest
    container_name: trainer-recap-05
    environment:
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    volumes:
      - ./data:/code/data
    networks:
      - recap-net
    depends_on:
      mlflow:
        condition: service_healthy

networks:
  recap-net:
    driver: bridge
